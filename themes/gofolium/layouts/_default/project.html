<article class="card bg-dark rounded-0 border-0">
  <div class="row no-gutters">
    <div class="col-md-4">
      {{ with .Params.Image }}
      <img src="{{ . | absURL }}" alt="" class="img-fluid rounded-0">
      {{ end }}
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <h4 class="card-title">
          <a href="{{ .Permalink }}">{{ .Title | markdownify }}</a>
        </h4>
        <p class="card-text">{{ .Summary }}</p>
      </div>
    </div>
  </div>
</article>
